apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: goblin-scout
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch"]
  - apiGroups: [""]
    resources: ["nodes", "resourcequotas", "namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["ops.goblinoperator.io"]
    resources: ["remediations", "remediations/status"]
    verbs: ["get", "patch"]
