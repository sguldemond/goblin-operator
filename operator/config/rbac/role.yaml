---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - ops.goblinoperator.io
  resources:
  - remediations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ops.goblinoperator.io
  resources:
  - remediations/finalizers
  verbs:
  - update
- apiGroups:
  - ops.goblinoperator.io
  resources:
  - remediations/status
  verbs:
  - get
  - patch
  - update
