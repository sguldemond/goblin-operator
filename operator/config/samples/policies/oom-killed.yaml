apiVersion: ops.goblinoperator.io/v1alpha1
kind: IncidentPolicy
metadata:
  name: oom-killed
spec:
  target:
    apiVersion: v1
    kind: Pod
  detect:
    trigger: OOMKilled
    expression: >-
      has(object.status.containerStatuses) &&
      object.status.containerStatuses.exists(c,
        has(c.lastState) && has(c.lastState.terminated) &&
        c.lastState.terminated.reason == 'OOMKilled')
  # Granted only while an incident from this policy is open, and only in the
  # target's namespace. The operator binds this role when the incident is
  # created and removes it when the incident closes.
  permissions:
    allow:
      - clusterRole: goblin-scout-patch-deployments
