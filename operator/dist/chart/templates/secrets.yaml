{{- include "goblin.validateValues" . -}}
{{- if not .Values.llm.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: goblin-scout-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
type: Opaque
stringData:
  LLM_API_KEY: {{ .Values.llm.apiKey | quote }}
{{- end }}
{{- if and .Values.telegram.enabled (not .Values.telegram.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: goblin-horn-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
type: Opaque
stringData:
  TELEGRAM_BOT_TOKEN: {{ .Values.telegram.botToken | quote }}
  TELEGRAM_CHAT_ID: {{ .Values.telegram.chatID | quote }}
{{- end }}
