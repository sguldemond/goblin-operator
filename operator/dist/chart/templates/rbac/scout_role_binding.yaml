{{- if .Values.rbac.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  name: goblin-scout
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: goblin-scout
subjects:
  - kind: ServiceAccount
    name: goblin-scout
    namespace: goblin
{{- end -}}
