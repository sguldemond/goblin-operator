{{- if .Values.rbac.enable }}
# Binds the namespaced half of manager-role.
#
# The operator writes Deployments in order to own the scout's lifecycle. That
# permission is deliberately a Role rather than a ClusterRole entry: cluster-wide
# write on Deployments would let a bug in the operator modify any workload in
# the cluster, when all it actually needs is its own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  name: goblin-manager-rolebinding
  namespace: goblin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: goblin-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ .Values.controllerManager.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
{{- end -}}
