{{- if .Values.rbac.enable }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  name: operator-manager-role
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - apps
  resources:
  - deployments
  - replicasets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ops.goblinoperator.io
  resources:
  - incidentpolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ops.goblinoperator.io
  resources:
  - incidentpolicies/status
  - incidents/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - ops.goblinoperator.io
  resources:
  - incidents
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ops.goblinoperator.io
  resources:
  - incidents/finalizers
  verbs:
  - update
- apiGroups:
  - rbac.authorization.k8s.io
  resourceNames:
  - goblin-scout-patch-deployments
  resources:
  - clusterroles
  verbs:
  - bind
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - rolebindings
  verbs:
  - create
  - delete
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: operator-manager-role
  namespace: goblin
rules:
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - patch
  - update
{{- end -}}
