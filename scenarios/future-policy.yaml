apiVersion: ops.goblinoperator.io/v1alpha1
kind: IncidentPolicy
metadata:
  name: oom-killed
spec:
  target:
    apiVersion: v1
    kind: Pod
  detect:
    trigger: OOMKilled
    expression: >-
      has(object.status.containerStatuses) &&
      object.status.containerStatuses.exists(c,
        has(c.lastState) && has(c.lastState.terminated) &&
        c.lastState.terminated.reason == 'OOMKilled')
  permissions:
    approval: required # required | auto | none — the human gate itself
    allow:
      - action: patchMemoryLimit
        bounds:
          increaseBy: { max: 50% } # relative to current limit
      - action: restartPod
        bounds:
          maxAttempts: 1
          cooldown: 10m
    deny:
      - action: scaleReplicas # explicit, even though allow is already exhaustive
      - action: deleteResource
